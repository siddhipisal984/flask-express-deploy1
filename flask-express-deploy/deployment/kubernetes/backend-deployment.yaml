apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-backend
  labels:
    app: flask-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-backend
  template:
    metadata:
      labels:
        app: flask-backend
    spec:
      containers:
        - name: flask-backend
          # python base image + inline flask app (no Docker Hub account needed)
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              pip install flask flask-cors gunicorn -q &&
              cat << 'EOF' > /app.py
              from flask import Flask, jsonify
              from flask_cors import CORS
              app = Flask(__name__)
              CORS(app)
              @app.route('/')
              def home():
                  return jsonify({"message": "Flask Backend is running!", "status": "ok"})
              @app.route('/api/data')
              def data():
                  return jsonify({"items": ["item1", "item2", "item3"], "source": "flask-backend"})
              EOF
              gunicorn --bind 0.0.0.0:5000 app:app
          ports:
            - containerPort: 5000
